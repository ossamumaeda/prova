version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: person-api-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5437:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U person -d persondb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: